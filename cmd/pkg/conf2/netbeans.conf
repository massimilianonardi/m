#!/bin/sh

TYPE="custom"

GITHUB_REPO="apache/netbeans"

LATEST_RELEASE_URL="https://api.github.com/repos/${GITHUB_REPO}/releases/latest"
VERSION="$(wget --no-check-certificate -qO- "$LATEST_RELEASE_URL" | grep -oP '"tag_name": "\K(.*)(?=")')"

DOWNLOAD_URL="https://dlcdn.apache.org/netbeans/netbeans/${VERSION}/netbeans-${VERSION}-bin.zip"

FILE_TYPE="zip"
SYMLINKS="netbeans=bin/netbeans"

CONF_VC="*"
