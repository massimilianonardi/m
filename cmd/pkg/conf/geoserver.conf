#!/bin/sh

TYPE="github"
GITHUB_REPO="geoserver/geoserver"
DOWNLOAD_URL='https://sourceforge.net/projects/geoserver/files/GeoServer/${VERSION}/geoserver-${VERSION}-bin.zip'

FILE_TYPE="zip"
SYMLINKS="geoserver-start=geoserver-start geoserver-stop=geoserver-stop geoserver-data=geoserver-data geoserver-plugins=geoserver-plugins"

SERVICE_EXEC_START="geoserver-start --no-admin"
SERVICE_EXEC_START="geoserver-start"
SERVICE_EXEC_STOP="geoserver-stop"
SERVICE_WORKING_DIR="\$PKG_HOME"

postinstall()
{
  #-----------------------------------------------------------------------------
  # HOME DETECTION
  #-----------------------------------------------------------------------------
  cat << 'EOF' | tee "./geoserver-start" "./geoserver-stop" > "./geoserver-data"
#!/bin/sh

if [ -L "$0" ]
then
  THIS_PATH="$(ls -ld -- "$0")"
  THIS_PATH="${THIS_PATH#*" $0 -> "}"
else
  THIS_PATH="$0"
fi

export GEOSERVER_HOME="$(cd -P -- "${THIS_PATH%/*}" && pwd -P)"

export GEOSERVER_DATA_DIR="${GEOSERVER_HOME}/data"
export GEOSERVER_RASTER_DIR="${GEOSERVER_HOME}/data-raster"

if [ -f "${GEOSERVER_HOME}/GEOSERVER_ENV.conf" ]
then
  . "${GEOSERVER_HOME}/GEOSERVER_ENV.conf"
fi

export PROXY_BASE_URL_HEADERS="true"

EOF



  cat << 'EOF' | tee -a "./geoserver-start" >> "./geoserver-stop"
if [ -w "${GEOSERVER_DATA_DIR}" ] && [ -L "${GEOSERVER_DATA_DIR}" ]
then
  true
else
  echo "No GEOSERVER_DATA_DIR found, using application defaults"
  export GEOSERVER_DATA_DIR=""
fi

if [ "$1" = "--no-admin" ]
then
  export JAVA_OPTS="${JAVA_OPTS:+"$JAVA_OPTS"} -DGEOSERVER_CONSOLE_DISABLED=true"
fi

export JAVA_OPTS="${JAVA_OPTS:+"$JAVA_OPTS"} -DALLOW_ENV_PARAMETRIZATION=true"

EOF



  #-----------------------------------------------------------------------------
  # START
  #-----------------------------------------------------------------------------
  cat << 'EOF' >> "./geoserver-start"

"$GEOSERVER_HOME/bin/startup.sh"

EOF



  #-----------------------------------------------------------------------------
  # STOP
  #-----------------------------------------------------------------------------
  cat << 'EOF' >> "./geoserver-stop"

"$GEOSERVER_HOME/bin/shutdown.sh"

EOF



  #-----------------------------------------------------------------------------
  # DATA
  #-----------------------------------------------------------------------------
  cat << 'EOF' >> "./geoserver-data"

DATA_DIR="$1"
RASTER_DIR="$2"



if [ ! -w "${GEOSERVER_HOME}" ]
then
  sudo --user $(ls -ld "${GEOSERVER_HOME}" | awk '{print $3}') -- "$0"
  exit "$?"
fi



cd "$GEOSERVER_HOME"



# edit conf
echo "DO YOU WANT TO EDIT \"start.ini\"? YES, NO (default = NO): "
read INSTALL_FLAG
if [ "$INSTALL_FLAG" = "YES" ] || [ "$INSTALL_FLAG" = "yes" ] || [ "$INSTALL_FLAG" = "Y" ] || [ "$INSTALL_FLAG" = "y" ] || [ "$INSTALL_FLAG" = "Yes" ]
then
  nano "${GEOSERVER_HOME}/start.ini"
fi



if [ ! -e "${GEOSERVER_HOME}/GEOSERVER_ENV.conf" ]
then
  cat << 'GEOSERVER_ENV' > "${GEOSERVER_HOME}/GEOSERVER_ENV.conf"
#export PROXY_BASE_URL="${X-Forwarded-Proto}://${X-Forwarded-Host}/geoserver"
#export GEOSERVER_CSRF_WHITELIST="example.org,test.com"
#export GEOSERVER_CSRF_DISABLED=true
#export JAVA_OPTS="${JAVA_OPTS:+"$JAVA_OPTS"} -DGEOSERVER_CONSOLE_DISABLED=true"

GEOSERVER_ENV

fi

# edit env
echo "DO YOU WANT TO EDIT \"GEOSERVER_ENV.conf\"? YES, NO (default = NO): "
read INSTALL_FLAG
if [ "$INSTALL_FLAG" = "YES" ] || [ "$INSTALL_FLAG" = "yes" ] || [ "$INSTALL_FLAG" = "Y" ] || [ "$INSTALL_FLAG" = "y" ] || [ "$INSTALL_FLAG" = "Yes" ]
then
  nano "${GEOSERVER_HOME}/GEOSERVER_ENV.conf"
fi



echo "GEOSERVER_HOME=$GEOSERVER_HOME"



# check current data dir config
if [ -d "${GEOSERVER_DATA_DIR}" ] && [ -L "${GEOSERVER_DATA_DIR}" ]
then
  set -- "${GEOSERVER_DATA_DIR}"

  TARGET="$(ls -ld -- "$1")"
  TARGET="${TARGET#*" $1 -> "}"
  if [ "$TARGET" = "${TARGET#/}" ]
  then
    # relative link
    TARGET="$(dirname -- "$1")/$TARGET"
  fi
  GEOSERVER_REAL_DATA_DIR="$(cd -L -- "$(dirname -- "$TARGET")" && pwd -L)/$(basename -- "$TARGET")"

  echo "GEOSERVER_DATA_DIR=$GEOSERVER_REAL_DATA_DIR"
elif [ -e "${GEOSERVER_DATA_DIR}" ]
then
  echo "ERROR! ${GEOSERVER_DATA_DIR} ALREADY EXISTS AND IS NOT A DATA DIRECTORY MANAGED BY THIS COMMAND!"
  exit 1
fi



# check current raster dir config
if [ -d "${GEOSERVER_RASTER_DIR}" ] && [ -L "${GEOSERVER_RASTER_DIR}" ]
then
  set -- "${GEOSERVER_RASTER_DIR}"

  TARGET="$(ls -ld -- "$1")"
  TARGET="${TARGET#*" $1 -> "}"
  if [ "$TARGET" = "${TARGET#/}" ]
  then
    # relative link
    TARGET="$(dirname -- "$1")/$TARGET"
  fi
  GEOSERVER_REAL_RASTER_DIR="$(cd -P -- "$(dirname -- "$TARGET")" && pwd -P)/$(basename -- "$TARGET")"

  echo "GEOSERVER_RASTER_DIR=$GEOSERVER_REAL_RASTER_DIR"
elif [ -e "${GEOSERVER_RASTER_DIR}" ]
then
  echo "ERROR! ${GEOSERVER_RASTER_DIR} ALREADY EXISTS AND IS NOT A DATA DIRECTORY MANAGED BY THIS COMMAND!"
  exit 1
fi



# data defaults
if [ -z "$GEOSERVER_REAL_DATA_DIR" ]
then
  GEOSERVER_REAL_DATA_DIR="${GEOSERVER_HOME}/data-dir"
fi

if [ -z "$DATA_DIR" ]
then
  echo "Enter data dir path (default = ${GEOSERVER_REAL_DATA_DIR}): "
  read DATA_DIR
fi

if [ -z "$DATA_DIR" ]
then
  DATA_DIR="${GEOSERVER_REAL_DATA_DIR}"
fi

if [ ! -e "$DATA_DIR" ]
then
  mkdir -p "$DATA_DIR"
fi

if [ ! -e "$DATA_DIR/geoserver-environment.properties" ]
then
  cat << 'GEOSERVER_ENV' > "$DATA_DIR/geoserver-environment.properties"
POSTGRES_HOST=127.0.0.1
POSTGRES_PORT=5432
POSTGRES_DB=postgres
POSTGRES_USER=postgres
POSTGRES_PASS=
GEOSERVER_RASTER=raster
GEOSERVER_PROXY_BASE_URL=${X-Forwarded-Proto}://${X-Forwarded-Host}/geoserver

GEOSERVER_ENV

fi

echo "DO YOU WANT TO EDIT \"geoserver-environment.properties\"? YES, NO (default = NO): "
read INSTALL_FLAG
if [ "$INSTALL_FLAG" = "YES" ] || [ "$INSTALL_FLAG" = "yes" ] || [ "$INSTALL_FLAG" = "Y" ] || [ "$INSTALL_FLAG" = "y" ] || [ "$INSTALL_FLAG" = "Yes" ]
then
  nano "$DATA_DIR/geoserver-environment.properties"
fi



# raster defaults
if [ -z "$GEOSERVER_REAL_RASTER_DIR" ]
then
  GEOSERVER_REAL_RASTER_DIR="${GEOSERVER_HOME}/data-raster-dir"
fi

if [ -z "$RASTER_DIR" ]
then
  echo "Enter raster dir path (default = ${GEOSERVER_REAL_RASTER_DIR}): "
  read RASTER_DIR
fi

if [ -z "$RASTER_DIR" ]
then
  RASTER_DIR="${GEOSERVER_REAL_RASTER_DIR}"
fi

if [ ! -e "$RASTER_DIR" ]
then
  mkdir -p "$RASTER_DIR"
fi



# update links
rm -f "${GEOSERVER_DATA_DIR}"
ln -s "$DATA_DIR" "${GEOSERVER_DATA_DIR}"

rm -f "${GEOSERVER_RASTER_DIR}"
ln -s "$RASTER_DIR" "${GEOSERVER_RASTER_DIR}"

rm -f "${GEOSERVER_DATA_DIR}/raster"
ln -s "${GEOSERVER_RASTER_DIR}" "${GEOSERVER_DATA_DIR}/raster"

GEOSERVER_DATA_DECOUPLED_DIR=".geoserver-data"
mkdir -p "${GEOSERVER_DATA_DIR}/${GEOSERVER_DATA_DECOUPLED_DIR}"
(
#  cd "${GEOSERVER_DATA_DIR}/${GEOSERVER_DATA_DECOUPLED_DIR}"
  cd "${GEOSERVER_DATA_DIR}"
  for k in coverages data gwc gwc-layers layergroups layouts legendsamples palettes styles user_projections validation workspaces
  do
    echo "decoupling: $k"

    if [ ! -e "./$k" ]
    then
      mkdir -p "./$k"
    fi

    if [ -d "./$k" ] && [ ! -L "./$k" ]
    then
      mv "./$k" "./${GEOSERVER_DATA_DECOUPLED_DIR}/$k"
      ln -s "./${GEOSERVER_DATA_DECOUPLED_DIR}/$k" "./$k"
    fi
  done
)

EOF



  #-----------------------------------------------------------------------------
  # PLUGINS
  #-----------------------------------------------------------------------------
  cat << EOF > "./geoserver-plugins"
#!/bin/sh

VERSION="$VERSION"

EOF



# TODO: skip all remaining option, if already exists ask if overwrite or skip and if installed ask if want uninstall
# BETTER: first list all installed (symlinks) and ask which to remove, second list all downloads and ask which to install (overwriting)
  cat << 'EOF' >> "./geoserver-plugins"

  echo "DO YOU WANT TO INSTALL GEOSERVER PLUGINS? YES, NO (default = NO): "
  read INSTALL_FLAG
  if [ "$INSTALL_FLAG" = "YES" ] || [ "$INSTALL_FLAG" = "yes" ] || [ "$INSTALL_FLAG" = "Y" ] || [ "$INSTALL_FLAG" = "y" ] || [ "$INSTALL_FLAG" = "Yes" ]
  then
    EXTENSIONS_URL="https://sourceforge.net/projects/geoserver/files/GeoServer/${VERSION}/extensions/"
    EXTENSIONS_URLS="$(wget --no-check-certificate -qO- "$EXTENSIONS_URL" | tr "<" "\n" | grep 'href="' | grep "${EXTENSIONS_URL}geoserver-${VERSION}-" | sed 's/.*href="//g' | sed 's/\/download"//g')"
    for k in $EXTENSIONS_URLS
    do
      PLUGIN="${k##*/}"
      echo "DO YOU WANT TO INSTALL '${PLUGIN}' PLUGIN? YES, NO (default = NO): "
      read INSTALL_FLAG
      if [ "$INSTALL_FLAG" = "YES" ] || [ "$INSTALL_FLAG" = "yes" ] || [ "$INSTALL_FLAG" = "Y" ] || [ "$INSTALL_FLAG" = "y" ] || [ "$INSTALL_FLAG" = "Yes" ]
      then
        echo "downloading plugin: ${PLUGIN}"
        pkg-download "$k" "" "$(pwd)/plugins/${PLUGIN%.zip}" "zip"
        for h in ./plugins/${PLUGIN%.zip}/*.jar
        do
          echo "installing plugin from: $h"
          ln -s "../../../../${h#./}" "./webapps/geoserver/WEB-INF/lib/${h##*/}"
        done
      fi
    done
  fi

EOF



  chmod +x "./geoserver-start"
  chmod +x "./geoserver-stop"
  chmod +x "./geoserver-data"
  chmod +x "./geoserver-plugins"

  "./geoserver-data"
  "./geoserver-plugins"

#  sed -i 's/jetty.http.port=8080/#jetty.http.port=8080/g' start.ini
}
